<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-gray-200 h-screen flex overflow-hidden">

    <aside class="w-80 bg-[#111827] border-r border-gray-800 flex flex-col justify-between hidden md:flex">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="fa-solid fa-robot text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="font-semibold text-sm tracking-wide text-white">Chat AI</h1>
                    <span class="text-[10px] text-indigo-400 font-medium tracking-widest uppercase">Creative Studio</span>
                </div>
            </div>

            <button id="new-chat-btn" class="w-full py-3 px-4 rounded-xl bg-gray-800/50 hover:bg-gray-800 border border-gray-700/50 hover:border-indigo-500/50 text-gray-300 hover:text-white transition-all duration-300 flex items-center justify-center gap-2 text-sm font-medium mb-6">
                <i class="fa-solid fa-plus text-xs"></i>
                New Conversation
            </button>

            <div class="space-y-2">
                <p class="text-[11px] font-semibold text-gray-500 uppercase tracking-wider px-2 mb-3">Recent Chats</p>
            </div>
        </div>

        <div class="p-4 border-t border-gray-800/60 bg-[#0D1321]">
            <div class="flex items-center justify-between p-2 rounded-xl hover:bg-gray-800/40 cursor-pointer transition-all">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white font-semibold text-sm">
                        K
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-200">Creative Director</p>
                        <p class="text-xs text-gray-500">Premium Account</p>
                    </div>
                </div>
                <i class="fa-solid fa-ellipsis-vertical text-gray-500 text-xs px-2"></i>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#0B0F19] relative">
        
        <header class="h-16 border-b border-gray-800/80 px-6 flex items-center justify-between bg-[#0B0F19]/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-sm font-medium text-gray-300">Model: Chat AI-v2.5 (Pro)</span>
            </div>
            <div class="flex items-center gap-4 text-gray-400">
                <button class="hover:text-white transition-colors"><i class="fa-regular fa-bell"></i></button>
                <button class="hover:text-white transition-colors"><i class="fa-solid fa-sliders"></i></button>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 no-scrollbar max-w-4xl w-full mx-auto pb-32">
            
            <div id="welcome-state" class="text-center py-12 space-y-4 max-w-md mx-auto">
                <div class="w-14 h-14 rounded-2xl bg-indigo-600/10 border border-indigo-500/20 mx-auto flex items-center justify-center mb-2 glow-effect">
                    <i class="fa-solid fa-robot text-indigo-400 text-xl"></i>
                </div>
                <h2 class="text-2xl font-semibold text-white tracking-tight">คุณจะให้ฉันช่วยสร้างสรรค์สิ่งใดวันนี้?</h2>
                <p class="text-sm text-gray-400 leading-relaxed">ถามคำถาม ออกแบบคอนเซปต์ หรือจัดการชุดข้อมูลที่ซับซ้อนของคุณได้ทันที</p>
            </div>

        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-[#0B0F19] via-[#0B0F19]/90 to-transparent pt-10 pb-6 px-4 md:px-12">
            <div class="max-w-4xl mx-auto relative">
                <form id="chat-form" class="bg-[#111827]/90 border border-gray-800 hover:border-gray-700/80 rounded-2xl p-2.5 flex items-center gap-3 transition-all duration-300 shadow-2xl backdrop-blur-xl focus-within:border-indigo-500/50 focus-within:ring-1 focus-within:ring-indigo-500/30">
                    
                    <button type="button" class="w-10 h-10 rounded-xl hover:bg-gray-800 text-gray-400 hover:text-gray-200 transition-all flex items-center justify-center text-sm">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    
                    <input type="text" id="user-input" placeholder="ส่งข้อความหา AI..." autocomplete="off" class="flex-1 bg-transparent border-none text-sm text-white placeholder-gray-500 focus:outline-none py-2 px-1">
                    
                    <button type="submit" class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-violet-500 hover:from-indigo-600 hover:to-violet-600 text-white font-medium transition-all duration-300 flex items-center justify-center shadow-lg shadow-indigo-500/20 hover:scale-[1.02]">
                        <i class="fa-solid fa-arrow-up text-xs"></i>
                    </button>
                </form>
                <p class="text-center text-[11px] text-gray-600 mt-3">Chat AI can make mistakes. Verify important information.</p>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
